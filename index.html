<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ItEnAi CRM — Уроки</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand__logo">ItEnAi<span>CRM</span></div>
      </div>

      <nav class="nav" id="sideNav">
  <button class="nav__item" type="button" data-page="page-profile">
    <span class="nav__icon">👤</span> Мій профіль
  </button>

  <button class="nav__item active" type="button" data-page="page-lessons">
    <span class="nav__icon">🗓️</span> Урок
  </button>

  <button class="nav__item" type="button" data-page="page-tasks">
    <span class="nav__icon">📋</span> Завдання
  </button>

  <button class="nav__item" type="button" data-page="page-chat">
    <span class="nav__icon">💬</span> Внутрішній чат
  </button>
</nav>
    </aside>

    <main class="main">
      <!-- Topbar -->
      <header class="topbar">
        <button id="sidebarToggle" class="icon-btn" aria-label="Меню">☰</button>

        <div class="search">
          <span class="search__icon">🔎</span>
          <input id="searchInput" class="search__input" placeholder="Пошук клієнта / предмета / викладача" />
        </div>

        <div class="topbar__right">
  <select id="teacherTopSelect" class="btn" style="padding:8px 10px;">
    <option value="">Усі викладачі</option>
  </select>
</div>
      </header>


      <section class="pages">
  <!-- ===== УРОКИ ===== -->
  <section class="page is-active" id="page-lessons">
    <!-- Toolbar -->
    <section class="toolbar">
      <div class="toolbar__left">
        <div class="view-icons">
          <button id="viewCalBtn" class="icon-btn" aria-label="Календар">📅</button>
          <button id="viewListBtn" class="icon-btn" aria-label="Список">≡</button>
        </div>

        <div class="nav-arrows">
          <button id="prevBtn" class="icon-btn" aria-label="Назад">‹</button>
          <button id="nextBtn" class="icon-btn" aria-label="Вперед">›</button>
        </div>

        <button id="todayBtn" class="btn btn-ghost">Сьогодні</button>

        <div class="title">
          <div id="titleBig" class="title__big">ЛЮТИЙ 2026</div>
          <div id="titleSub" class="title__sub">—</div>
        </div>
      </div>

      <div class="toolbar__right" style="display:flex; gap:10px; align-items:center;">
        <select id="subjectFilter" class="btn" style="padding:10px 12px;">
          <option value="">Усі предмети</option>
        </select>

        <select id="teacherFilter" class="btn" style="padding:10px 12px;">
          <option value="">Усі викладачі</option>
        </select>

        <select id="roleSelect" class="btn" style="padding:10px 12px;">
          <option value="teacher">Роль: Вчитель</option>
          <option value="student">Роль: Учень</option>
        </select>

        <input id="studentNameInput" class="btn" style="display:none; width:220px;"
               placeholder="Ім'я учня (для ролі Учень)" />

        <button id="addLessonBtn" class="btn btn-primary">➕ Урок</button>
      </div>
    </section>

    <section class="content">
      <!-- Tabs radio -->
      <input class="tab-radio" type="radio" name="calview" id="tab-month">
      <input class="tab-radio" type="radio" name="calview" id="tab-week">
      <input class="tab-radio" type="radio" name="calview" id="tab-day" checked>

      <div class="tabs">
        <label class="tab" for="tab-month">Місяць</label>
        <label class="tab" for="tab-week">Тиждень</label>
        <label class="tab" for="tab-day">День</label>
      </div>

      <!-- MONTH -->
      <section class="panel panel--month">
        <div class="month-grid" id="monthGrid"></div>
      </section>

      <!-- WEEK -->
      <section class="panel panel--week">
        <div class="week" id="weekWrap">
          <div class="week__grid">
            <div class="week__timecol" id="weekTimeCol"></div>
            <div class="week__days" id="weekDays"></div>
          </div>
        </div>
      </section>

      <!-- LIST -->
      <section class="panel panel--list">
        <div class="card" style="padding:12px 14px;">
          <div class="status-tabs">
            <button class="status-tab" data-status="done">Проведений</button>
            <button class="status-tab" data-status="cancelled">Скасований</button>
            <button class="status-tab is-active" data-status="planned">Запланований</button>
          </div>
          <div class="list-table" id="listTable"></div>
        </div>
      </section>

      <!-- DAY -->
      <section class="panel panel--day">
        <div class="day">
          <div class="day__head">
            <div id="dayTitle" class="day__title">—</div>
            <div id="daySubtitle" class="day__subtitle">—</div>
          </div>

          <div class="day__grid" id="dayGrid">
            <div class="day__timecol" id="timeCol"></div>
            <div class="day__lane" id="dayLane" aria-label="Розклад дня"></div>
          </div>
        </div>
      </section>
    </section>
  </section>

  <!-- ===== ПРОФІЛЬ ===== -->
  <section class="page" id="page-profile">
    <div class="profile2">
      <div class="profile2__top">
        <div class="profile2__who">
          <div class="profile2__avatar">🙂</div>
          <div>
            <div class="profile2__name" id="profileName">Платонова Юлія</div>
<div class="profile2__sub muted" id="profileSchool">ItEnAi / ITENAI School</div>
          </div>
        </div>

        <div class="profile2__actions">
  <button id="btnDoneRegister" class="btn btn-primary">Реєстр проведених уроків</button>
  <button id="btnSalaryStatement" class="btn btn-ghost">Виписка по зарплаті</button>
</div>
      </div>

      <div class="profile2__grid">
        <div class="card">
          <div class="card__section">
            <div class="section-head">
              <div class="section-title">Розклад на найближчі 7 днів</div>
            </div>
            <div id="profileSchedule" class="profile2__schedule muted">—</div>
          </div>
        </div>

        <div class="card card--side">
          <div class="card__section">
            <div class="section-title">Статистика</div>
            <div id="profileStats" class="profile2__stats muted">—</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== ЗАВДАННЯ ===== -->
  <section class="page" id="page-tasks">
  <div class="card" style="padding:14px 16px;">
    <div class="tasks-head">
      <div>
        <div style="font-weight:900;">Завдання</div>
        <div class="muted" id="tasksHint">—</div>
      </div>

      <div class="tasks-actions">
        <button class="btn btn-primary" id="addTaskBtn">➕ Додати завдання</button>
      </div>
    </div>

    <div class="tasks-list" id="tasksList"></div>
  </div>
</section>

  <!-- ===== ЧАТ ===== -->
  <section class="page" id="page-chat">
    <div class="chat">
      <div class="chat__left card">
        <div class="chat__leftHead">
          <input class="chat__search" placeholder="Пошук за контактами" />
          <button id="newChatBtn" class="btn btn-primary">+ Новий чат</button>
        </div>
        <div class="chat__contacts">
          <button class="chat__contact is-active">
            <div class="chat__ava">🙂</div>
            <div>
              <div class="chat__name">Платонова Юлія</div>
              <div class="chat__hint muted">Це ви</div>
            </div>
          </button>
        </div>
      </div>

      <div class="chat__right card">
  <div class="chat__head" id="chatHead">
    <div class="chat__title" id="chatTitle">Чат</div>
    <div class="muted" id="chatSub">—</div>
  </div>

  <div class="chat__msgs" id="chatMsgs">
    <div class="chat__empty muted">Оберіть чат зліва або створіть новий 🙂</div>
  </div>

  <div class="chat__composer" id="chatComposer" style="display:none;">
    <input id="chatInput" class="chat__input" placeholder="Напишіть повідомлення…" />
    <button id="chatSendBtn" class="btn btn-primary">Надіслати</button>
  </div>
</div>
    </div>
  </section>
</section>
    </main>
  </div>

  <!-- Modal (JS керує відкриттям/закриттям) -->
  <div class="modal-js" id="lessonModal" aria-hidden="true">
    <div class="modal-js__backdrop" data-close="1"></div>
    <div class="modal-js__card" role="dialog" aria-modal="true" aria-label="Урок">
      <div class="modal-js__head">
        <div class="modal-js__title" id="modalTitle">Урок</div>
        <button class="icon-btn" data-close="1" aria-label="Закрити">✕</button>
      </div>

      <div class="modal-js__body">
        <div class="form-grid">
         <div class="field field--full">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <span style="color:var(--muted); font-weight:800; font-size:12.5px;">Учні</span>

    <div style="display:flex; gap:10px; align-items:center;">
      <label style="display:flex; gap:8px; align-items:center; font-weight:800; color:var(--muted); font-size:12.5px;">
        <input id="fIsGroup" type="checkbox" />
        Група
      </label>
      <button id="addStudentBtn" type="button" class="btn btn-ghost btn-sm">+ Додати учня</button>
    </div>
  </div>

  <div id="studentsWrap" class="students-wrap">
    <!-- JS додасть інпути -->
  </div>
</div>

          <label class="field">
            <span>Дата</span>
            <input id="fDate" type="date" />
          </label>

          <label class="field">
            <span>Початок</span>
            <input id="fStart" type="time" step="300" />
          </label>

          <label class="field">
            <span>Тривалість (хв)</span>
            <input id="fDur" type="number" min="10" max="240" value="50" />
          </label>

          <label class="field">
            <span>Предмет</span>
            <input id="fSubject" placeholder="Напр. Основи ШІ" />
          </label>

          <label class="field">
            <span>Учень</span>
            <input id="fStudent" placeholder="ПІБ учня" />
          </label>

          <label class="field">
            <span>Викладач</span>
            <input id="fTeacher" placeholder="ПІБ викладача" />
          </label>

          <label class="field">
            <span>Тип</span>
            <select id="fType">
              <option value="Індивідуальний">Індивідуальний</option>
              <option value="Груповий">Груповий</option>
            </select>
          </label>

          <label class="field">
            <span>Статус</span>
            <select id="fStatus">
              <option value="planned">Заплановано</option>
              <option value="cancelled">Скасований</option>
              <option value="done">Проведено та оплачено</option>
              <option value="debt">Проведено в борг</option>
              <option value="missed">Пропуск</option>
              <option value="free">Безкоштовний</option>
            </select>
          </label>

          <label class="field field--full">
            <span>Нотатка</span>
            <input id="fNote" placeholder="Що важливо пам'ятати про урок (опційно)" />
          </label>
        </div>
      </div>

      <div class="modal-js__foot">
        <button id="saveBtn" class="btn btn-primary">💾 Зберегти</button>
        <button id="deleteBtn" class="btn btn-ghost" style="border-color:#fecaca; color:#b91c1c;">🗑 Видалити</button>
        <div style="margin-left:auto" class="muted" id="dragHint">Порада: перетягни урок у таймлайн, щоб змінити час 😉</div>
      </div>
    </div>
  </div>

  <!-- Report modal -->
<div class="modal-js" id="reportModal" aria-hidden="true">
  <div class="modal-js__backdrop" data-close="1"></div>
  <div class="modal-js__card" role="dialog" aria-modal="true" aria-label="Звіт">
    <div class="modal-js__head">
      <div class="modal-js__title" id="reportTitle">Звіт</div>
      <button class="icon-btn" data-close="1" aria-label="Закрити">✕</button>
    </div>

    <div class="modal-js__body">
      <div class="muted" id="reportSummary" style="margin-bottom:10px;">—</div>
      <div id="reportTable"></div>
    </div>

    <div class="modal-js__foot">
      <button class="btn btn-ghost" data-close="1">Закрити</button>
    </div>
  </div>
</div>

  <script src="app.js"></script>
</body>
</html>
